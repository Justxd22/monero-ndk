name: Build NDK from Source

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build python3 python3-pip \
            git build-essential lld

      - name: Print build info
        run: make info

      - name: Restore AOSP sources cache
        id: cache-sources
        uses: actions/cache/restore@v4
        with:
          path: sources/
          key: aosp-sources-${{ hashFiles('config.sh') }}

      - name: Fetch sources
        run: make fetch

      - name: Save AOSP sources cache
        if: steps.cache-sources.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: sources/
          key: aosp-sources-${{ hashFiles('config.sh') }}

      - name: Restore LLVM build cache
        id: cache-llvm
        uses: actions/cache/restore@v4
        with:
          path: build/llvm-install/
          key: llvm-build-${{ hashFiles('config.sh', 'scripts/02-build-llvm.sh') }}

      - name: Build LLVM
        run: make llvm

      - name: Save LLVM build cache
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: build/llvm-install/
          key: llvm-build-${{ hashFiles('config.sh', 'scripts/02-build-llvm.sh') }}

      - name: Restore sysroot cache
        id: cache-sysroot
        uses: actions/cache/restore@v4
        with:
          path: output/sysroot/
          key: sysroot-build-${{ hashFiles('config.sh', 'scripts/03-build-sysroot.sh', 'scripts/03a-generate-stubs.sh', 'scripts/03b-build-crt.sh', 'scripts/03c-build-libm.sh', 'scripts/03d-build-libc.sh') }}

      - name: Build sysroot
        run: make sysroot

      - name: Save sysroot cache
        if: steps.cache-sysroot.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: output/sysroot/
          key: sysroot-build-${{ hashFiles('config.sh', 'scripts/03-build-sysroot.sh', 'scripts/03a-generate-stubs.sh', 'scripts/03b-build-crt.sh', 'scripts/03c-build-libm.sh', 'scripts/03d-build-libc.sh') }}

      - name: Build runtimes
        run: make runtimes

      - name: Assemble NDK
        run: make assemble

      - name: Verify
        run: make verify

      - name: Hash output for reproducibility
        run: |
          echo "=== Reproducibility hashes ==="
          find output/ -type f -exec sha256sum {} \; | sort -k2 > output-hashes.txt
          sha256sum output-hashes.txt
          echo ""
          echo "Total files: $(wc -l < output-hashes.txt)"
          head -20 output-hashes.txt

      - name: Package release tarball
        run: |
          cd output
          tar czf ../monero-ndk-linux.tar.gz .
          cd ..
          sha256sum monero-ndk-linux.tar.gz | tee monero-ndk-linux.tar.gz.sha256
          echo "NDK_SHA256=$(sha256sum monero-ndk-linux.tar.gz | cut -d' ' -f1)" >> $GITHUB_ENV
          ls -lh monero-ndk-linux.tar.gz

      - name: Upload NDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: monero-ndk-${{ github.sha }}
          path: |
            monero-ndk-linux.tar.gz
            monero-ndk-linux.tar.gz.sha256
          retention-days: 30

      - name: Upload hashes
        uses: actions/upload-artifact@v4
        with:
          name: monero-ndk-hashes-${{ github.sha }}
          path: output-hashes.txt
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            monero-ndk-linux.tar.gz
            monero-ndk-linux.tar.gz.sha256
            output-hashes.txt
          body: |
            ## monero-ndk from source

            Built entirely from AOSP source — no prebuilt binaries.

            **Targets:** aarch64, armv7a, x86_64 (API level 21)
            **SHA256:** `${{ env.NDK_SHA256 }}`

            ### Usage with simplybs
            Update `android_ndk.json` to point at this tarball.

            ### Verify
            ```
            sha256sum -c monero-ndk-linux.tar.gz.sha256
            ```
