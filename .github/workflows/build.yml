name: Build NDK from Source

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build python3 python3-pip \
            git build-essential lld

      - name: Print build info
        run: make info

      - name: Restore AOSP sources cache
        id: cache-sources
        uses: actions/cache/restore@v4
        with:
          path: sources/
          key: aosp-sources-${{ hashFiles('config.sh') }}

      - name: Fetch sources
        run: make fetch

      - name: Save AOSP sources cache
        if: steps.cache-sources.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: sources/
          key: aosp-sources-${{ hashFiles('config.sh') }}

      - name: Restore LLVM build cache
        id: cache-llvm
        uses: actions/cache/restore@v4
        with:
          path: build/llvm-install/
          key: llvm-build-${{ hashFiles('config.sh', 'scripts/02-build-llvm.sh') }}

      - name: Build LLVM
        run: make llvm

      - name: Save LLVM build cache
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: build/llvm-install/
          key: llvm-build-${{ hashFiles('config.sh', 'scripts/02-build-llvm.sh') }}

      - name: Build sysroot
        run: make sysroot

      - name: Build runtimes
        run: make runtimes

      - name: Assemble NDK
        run: make assemble

      - name: Verify
        run: make verify

      - name: Hash output for reproducibility
        run: |
          echo "=== Reproducibility hashes ==="
          find output/ -type f -exec sha256sum {} \; | sort -k2 > output-hashes.txt
          sha256sum output-hashes.txt
          echo ""
          echo "Total files: $(wc -l < output-hashes.txt)"
          head -20 output-hashes.txt

      - name: Upload NDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: monero-ndk-${{ github.sha }}
          path: output/
          retention-days: 30

      - name: Upload hashes
        uses: actions/upload-artifact@v4
        with:
          name: monero-ndk-hashes-${{ github.sha }}
          path: output-hashes.txt
          retention-days: 30
